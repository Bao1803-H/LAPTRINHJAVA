services:
  mysql:
    image: mysql:8.4
    container_name: journal-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-su26swp06}
      MYSQL_USER: ${DB_USERNAME:-journal_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-journal_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journal-tracker-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-su26swp06}
      DB_USERNAME: ${DB_USERNAME:-journal_user}
      DB_PASSWORD: ${DB_PASSWORD:-journal_pass}
    ports:
      - "8080:8080"

volumes:
  mysql_data:
